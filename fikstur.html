<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fenerbahçe-Matches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="header-section">
      <div class="upper-part">
        <h2 class="title">Fenerbahçe</h2>
        <img src="assets/images/fb-icon.svg" alt="Fenerbahçe Logosu" class="logo" />
      </div>
      <ul class="option-list">
        <li><a href="index.html" class="option">Anasayfa</a></li>
        <li><a href="kadro.html" class="option">Kadro</a></li>
        <li><a href="fikstur.html" class="option">Fikstür</a></li>
        <li><a href="standings.html" class="option">Puan Durumu</a></li>
      </ul>
    </div>
    <div class="fikstur-main-wrapper">
      <div class="drop-down-menu-container">
        <button class="select-division">Müsabaka</button>
        <div class="options-list">
          <span class="option-fikstur" id="super-lig">Süper Lig</span>
          <span class="option-fikstur" id="ziraat">Ziraat Kupası</span>
          <span class="option-fikstur" id="avrupa-ligi">Avrupa Ligi</span>
        </div>
      </div>
      <div class="division-header">
        <h2 class="Title">SÜPER LİG</h2>
      </div>
      <div class="displayed-matches-container">
        <template id="match-display-template">
          <div class="displayed-match">
            <span class="team-1"></span>
            <span class="team-1-score"> </span>
            <span class="team-2-score"> </span>
            <span class="team-2"></span>
          </div>
        </template>
      </div>
    </div>
    <script src="scripts/fikstur.js" defer></script>
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-top">
          <div class="footer-brand">
            <img
              src="assets/images/fb-icon.svg"
              alt="Fenerbahçe Logosu"
              class="footer-logo"
            />
            <span class="footer-title">Fenerbahçe</span>
          </div>
          <ul class="footer-nav">
            <li><a href="index.html" class="footer-link">Anasayfa</a></li>
            <li><a href="kadro.html" class="footer-link">Kadro</a></li>
            <li><a href="fikstur.html" class="footer-link">Fikstür</a></li>
            <li>
              <a href="standings.html" class="footer-link">Puan Durumu</a>
            </li>
          </ul>
        </div>
        <span class="footer-divider"></span>
        <p class="footer-copy">
          © 2025 Fenerbahçe S.K. · Est. 1907 · Tüm hakları saklıdır.
        </p>
      </div>
    </footer>
  </body>
</html>
