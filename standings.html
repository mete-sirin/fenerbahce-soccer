<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fenerbahçe-PuanDurumu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="header-section">
      <div class="upper-part">
        <h2 class="title">Fenerbahçe</h2>
        <img
          src="assets/images/fb-icon.svg"
          alt="Fenerbahçe Logosu"
          class="logo"
        />
      </div>
      <ul class="option-list">
        <li><a href="index.html" class="option">Anasayfa</a></li>
        <li><a href="kadro.html" class="option">Kadro</a></li>
        <li><a href="fikstur.html" class="option">Fikstür</a></li>
        <li><a href="standings.html" class="option">Puan Durumu</a></li>
      </ul>
    </div>
    <div class="standings-main-wrapper">
      <div class="tables-wrapper">
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th class="col-team">Takım Adı</th>
              <th>O</th>
              <th>G</th>
              <th>B</th>
              <th>M</th>
              <th>AG</th>
              <th>YG</th>
              <th>P</th>
            </tr>
          </thead>
          <tbody id="standings-tbody"></tbody>
        </table>
      </div>
    </div>
    <template id="standings-table-row-template">
      <tr>
        <td class="position"></td>
        <td class="col-team"></td>
        <td class="matches-played"></td>
        <td class="victory"></td>
        <td class="defeat"></td>
        <td class="draw"></td>
        <td class="goals-scored"></td>
        <td class="goals-conceded"></td>
        <td class="points-scored"></td>
      </tr>
    </template>
    <script src="scripts/standings.js" defer></script>
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-top">
          <div class="footer-brand">
            <img
              src="assets/images/fb-icon.svg"
              alt="Fenerbahçe Logosu"
              class="footer-logo"
            />
            <span class="footer-title">Fenerbahçe</span>
          </div>
          <ul class="footer-nav">
            <li><a href="index.html" class="footer-link">Anasayfa</a></li>
            <li><a href="kadro.html" class="footer-link">Kadro</a></li>
            <li><a href="fikstur.html" class="footer-link">Fikstür</a></li>
            <li>
              <a href="standings.html" class="footer-link">Puan Durumu</a>
            </li>
          </ul>
        </div>
        <span class="footer-divider"></span>
        <p class="footer-copy">
          © 2025 Fenerbahçe S.K. · Est. 1907 · Tüm hakları saklıdır.
        </p>
      </div>
    </footer>
  </body>
</html>
